<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MainKun Java World</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f5f5f5;
}

header{
    background:#87ceeb;
    padding:20px;
}

h1{
    margin:0;
    color:#5a3a1a;
}

.subtitle{
    font-size:20px;
    margin-top:10px;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.main-area{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.left-panel{
    flex:1;
    min-width:300px;
    background:white;
    padding:20px;
    border-radius:15px;
}

.right-panel{
    flex:1;
    min-width:300px;
    background:white;
    padding:20px;
    border-radius:15px;
}

.code-box{
    background:#f0f0f0;
    border:1px solid #ccc;
    padding:15px;
    font-family:monospace;
    margin-top:10px;
}

button{
    margin-top:15px;
    padding:12px 24px;
    font-size:18px;
    cursor:pointer;
}

.map-area{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:15px;
}

.map-list{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.place{
    border:1px solid #ccc;
    padding:15px;
    border-radius:10px;
    width:180px;
    text-align:center;
    background:#fffdf5;
}
</style>
</head>

<body>

<header>
    <h1>mainくん Java World</h1>
    <div class="subtitle">
        mainくんたちと、Javaの世界をぼうけんしよう！
    </div>
</header>

<div class="container">

    <div class="main-area">

        <div class="left-panel">
            <h2>こんにちは！</h2>

            <p>ぼくは mainくん！</p>
            <p>ここは Java の世界。</p>
            <p>わからなくても大丈夫。</p>
            <p>いっしょにゆっくり学んでいこう！</p>
        </div>

        <div class="right-panel">
            <h2>はじめてのことば</h2>

            <div class="code-box">
System.out.println("こんにちは");
            </div>

            <button>Javaさんに伝える（実行）</button>

            <h3>Javaさんからの返事</h3>

            <div class="code-box">
こんにちは
            </div>
        </div>

    </div>

    <div class="map-area">

        <h2>Javaの世界マップ</h2>

        <div class="map-list">

            <div class="place">
                <h3>main村</h3>
                <p>Javaさんに話しかけよう！</p>
            </div>

            <div class="place">
                <h3>データ型の浜辺</h3>
                <p>データ型のなかまたちに会おう！</p>
            </div>

            <div class="place">
                <h3>ifのパン屋さん</h3>
                <p>条件分岐を学ぼう！</p>
            </div>

            <div class="place">
                <h3>switch寿司</h3>
                <p>switch文を学ぼう！</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>

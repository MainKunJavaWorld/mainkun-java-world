<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MainKun Java World</title>

<style>

body{
    margin:0;
    font-family:sans-serif;
    background:#f5f5f5;
}

header{
    background:#87ceeb;
    padding:20px;
}

h1{
    margin:0;
    color:#5a3a1a;
}

.subtitle{
    font-size:20px;
    margin-top:10px;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.main-area{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.left-panel{
    flex:1;
    min-width:300px;
    background:white;
    padding:20px;
    border-radius:15px;
}

.right-panel{
    flex:1;
    min-width:300px;
    background:white;
    padding:20px;
    border-radius:15px;
}

.code-box{
    font-family:monospace;
    margin-top:10px;
    width:100%;
    box-sizing:border-box;
    padding:15px;
    border-radius:15px;
    min-height:60px;
}

button{
    margin-top:15px;
    padding:12px 24px;
    font-size:18px;
    cursor:pointer;
}

.success-bubble{
    background:#e8f8e8;
    border:2px solid #4caf50;
}

.error-bubble{
    background:#fff3e0;
    border:2px solid #ff9800;
}

.map-area{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:15px;
}

.map-list{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.place{
    border:1px solid #ccc;
    padding:15px;
    border-radius:10px;
    width:180px;
    text-align:center;
    background:#fffdf5;
}

textarea{
    width:100%;
    box-sizing:border-box;
    padding:15px;
    font-family:monospace;
}

</style>

</head>

<body>

<header>

<h1>mainくん Java World</h1>

<div class="subtitle">
mainくんたちと、Javaの世界をぼうけんしよう！
</div>

</header>

<div class="container">

<div class="main-area">

<div class="left-panel">

<div id="mainMessage">

<h2>こんにちは！</h2>

<p>ぼくは mainくん！</p>

<p>ここは Java の世界。</p>

<p>わからなくても大丈夫。</p>

<p>いっしょにゆっくり学んでいこう！</p>

</div>

</div>

<div class="right-panel">

<h2>はじめてのことば</h2>

<textarea
id="codeInput"
rows="4">System.out.println("こんにちは");</textarea>

<button onclick="runJava()">
Javaさんに伝える（実行）
</button>

<h3>Javaさんからの返事</h3>

<div id="result" class="code-box success-bubble">
こんにちは
</div>

</div>

</div>

<div class="map-area">

<h2>Javaの世界マップ</h2>

<div class="map-list">

<div class="place">
<h3>main村</h3>
<p>Javaさんに話しかけよう！</p>
</div>

<div class="place">
<h3>データ型の浜辺</h3>
<p>データ型のなかまたちに会おう！</p>
</div>

<div class="place">
<h3>ifのパン屋さん</h3>
<p>条件分岐を学ぼう！</p>
</div>

<div class="place">
<h3>switch寿司</h3>
<p>switch文を学ぼう！</p>
</div>

</div>

</div>

</div>

<script>

function runJava() {

    const code =
        document.getElementById("codeInput").value.trim();

    const result =
        document.getElementById("result");

    const mainMessage =
        document.getElementById("mainMessage");

    const successMatch =
        code.match(/^System\.out\.println\("([^"]*)"\);$/);

    if (successMatch) {

        const text = successMatch[1];

        result.className =
            "code-box success-bubble";

        result.innerHTML = text;

        mainMessage.innerHTML = `
            <h2>こんにちは！</h2>

            <p>ぼくは mainくん！</p>

            <p>Javaさんが君の文章を読んで、</p>

            <p>「${text}」</p>

            <p>を返してくれたよ！</p>

            <p>" " の中に書いた言葉が表示されるんだ。</p>

            <p>いろいろ試してみよう！</p>
        `;

        return;
    }

    if (code.match(/^System\.out\.println\(".*"\)$/)) {

        result.className =
            "code-box error-bubble";

        result.innerHTML =
            "error: ';' expected";

        mainMessage.innerHTML = `
            <h2>こんにちは！</h2>

            <p>ぼくは mainくん！</p>

            <p>びっくりしたかな？</p>

            <p>Javaさんは怒っているんじゃないんだ。</p>

            <p>文の最後の ; が見つからなくて</p>

            <p>困っているんだよ。</p>
        `;

        return;
    }

    if (code.match(/^System\.out\.println\([A-Za-z0-9_ぁ-んァ-ヶ一-龯]+\);$/)) {

        result.className =
            "code-box error-bubble";

        result.innerHTML =
            "error: cannot find symbol";

        mainMessage.innerHTML = `
            <h2>こんにちは！</h2>

            <p>ぼくは mainくん！</p>

            <p>文字を探したけど</p>

            <p>見つからなかったみたい。</p>

            <p>文字を表示するときは</p>

            <p>"こんにちは"</p>

            <p>みたいに " " で囲もう！</p>
        `;

        return;
    }

    if (code.match(/^System\.out\.println\(.*;$/)) {

        result.className =
            "code-box error-bubble";

        result.innerHTML =
            "error: ')' expected";

        mainMessage.innerHTML = `
            <h2>こんにちは！</h2>

            <p>ぼくは mainくん！</p>

            <p>閉じるカッコ ) が</p>

            <p>見つからなかったみたい。</p>

            <p>開いたカッコには</p>

            <p>閉じるカッコが必要なんだ。</p>
        `;

        return;
    }

    result.className =
        "code-box error-bubble";

    result.innerHTML =
        "error: invalid statement";

    mainMessage.innerHTML = `
        <h2>こんにちは！</h2>

        <p>ぼくは mainくん！</p>

        <p>Javaさんは</p>

        <p>まだ読み方が分からないみたい。</p>

        <p>まずは</p>

        <p>System.out.println("こんにちは");</p>

        <p>を書いてみよう！</p>
    `;
}

</script>

</body>
</html>

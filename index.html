<script>

function runJava() {

    const code =
        document.getElementById("codeInput").value;

    const result =
        document.getElementById("result");

    const match =
        code.match(/System\.out\.println\("(.+)"\);/);

    if(match){

        result.innerHTML = match[1];

    }
    else{

        result.innerHTML =
            "Javaさん「System.out.println(\"...\"); の形で書いてみよう」";

    }
}

</script>
